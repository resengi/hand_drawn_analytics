melos:
  useRootAsPackage: true
  command:
    version:
      fetchTags: true
      message: "chore: release v{new_version} [skip ci]"
      releaseUrl: true
      changelogs:
        - path: CHANGELOG.md
          packageFilters:
            include:
              - hand_drawn_analytics
    bootstrap:
      usePubspecOverrides: true